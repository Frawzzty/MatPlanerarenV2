<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matplaneraren</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="backgroundImage">
    <main>
        <div class="searchDiv">
            <div class="searchInputs">
                <input type="text" name="" id="searchFilter" class="searchFilter" onchange="filterDropdown()"
                    placeholder="Sök efter livsmedel..."><br>
                <select class="foodDropDown" id="allFoodItemsDropDown"></select>
            </div>

            <input class="addButton" type="button" id="addButton" value="Lägg till" onclick="addFoodCard()">
        </div>

        <div class="quickAdd-container">
            <h2>Lägg till snabbt</h2>
            <div class="quickAdd-buttons" id="quickAdd-buttons"></div>
        </div>


        <div class="food-container" id="foodContainer">

        </div>

        <div class="totals-container" data-totals="totals">
            <h2>Total</h2>
            <div class="calculation">
                <div class="variant-container">
                    <span class="variantText">Energi (Kcal): </span>
                    <span class="kcal">0</span> <span> Kcal</span>
                </div>

                <div class="variant-container">
                    <span class="variantText">Kolhydrater (g): </span>
                    <span class="carbs">0</span> <span> g</span>
                </div>

                <div class="variant-container">
                    <span class="variantText">Fett, totalt (g): </span>
                    <span class="fat">0</span>
                    <span> g</span>
                </div>

                <div class="variant-container">
                    <span class="variantText">Fibrer (g): </span>
                    <span class="fibers">0</span>
                    <span> g</span>
                </div>

                <div class="variant-container">
                    <span class="variantText">Protein (g): </span>
                    <span class="protien">0</span>
                    <span> g</span>
                </div>
            </div>
        </div>

    </main>

    <script src="script/script.js"></script>
</body>

</html>
